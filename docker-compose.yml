version: '3.8'
services:
  hubterm:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - hubterm-data:/data
    environment:
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      - DB_PATH=/data/hubterm.db
    restart: unless-stopped

volumes:
  hubterm-data:
