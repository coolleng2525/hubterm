version: '3.8'
services:
  hubterm:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - hubterm-data:/data
    environment:
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      - DB_PATH=/data/hubterm.db
      - PORT=${PORT:-8080}
    restart: unless-stopped

  nginx-https:
    image: nginx:1.27-alpine
    depends_on:
      - hubterm
    ports:
      - "${HTTPS_PORT:-8087}:443"
    volumes:
      - hubterm-nginx-certs:/etc/nginx/certs
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        if ! command -v openssl >/dev/null 2>&1; then
          apk add --no-cache openssl
        fi
        if [ ! -f /etc/nginx/certs/hubterm.crt ] || [ ! -f /etc/nginx/certs/hubterm.key ]; then
          openssl req -x509 -nodes -newkey rsa:2048 -days 3650 -keyout /etc/nginx/certs/hubterm.key -out /etc/nginx/certs/hubterm.crt -subj "/CN=${NGINX_SERVER_NAME:-localhost}" -addext "subjectAltName=DNS:${NGINX_CERT_DNS:-localhost},IP:${NGINX_CERT_IP:-127.0.0.1}"
        fi
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 443 ssl;
          server_name _;

          ssl_certificate /etc/nginx/certs/hubterm.crt;
          ssl_certificate_key /etc/nginx/certs/hubterm.key;
          ssl_protocols TLSv1.2 TLSv1.3;

          client_max_body_size 100m;

          location / {
            proxy_pass http://hubterm:${PORT:-8080};
            proxy_http_version 1.1;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $$http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
          }
        }
        EOF
        nginx -g "daemon off;"
    restart: unless-stopped

volumes:
  hubterm-data:
  hubterm-nginx-certs:
