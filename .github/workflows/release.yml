name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd web && npm ci && npm run build

      - name: Build Tabby plugin
        run: |
          cd tabby-hubterm-plugin
          npm ci --legacy-peer-deps
          npm run build > ../build.log 2>&1
          npm pack

      - name: Push debug log on failure
        if: failure()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout -b debug-log
          git add build.log || true
          git commit -m "chore: add debug build log"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/coolleng2525/hubterm.git debug-log --force

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          # Frontend and Tabby builds intentionally create artifacts before GoReleaser.
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Tabby plugin package
        run: gh release upload "${GITHUB_REF_NAME}" tabby-hubterm-plugin/tabby-hubterm-*.tgz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

