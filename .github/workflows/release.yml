name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd web && npm ci && npm run build

      - name: Build Tabby plugin
        run: |
          cd tabby-hubterm-plugin
          npm ci --legacy-peer-deps
          npm run build
          npm pack
          VERSION=$(jq -r .version package.json)
          mkdir -p ../tabby-hubterm-windows/tabby-hubterm
          cp windows-packaging/install.cmd ../tabby-hubterm-windows/
          cp windows-packaging/README-安装说明.txt ../tabby-hubterm-windows/
          cp package.json ../tabby-hubterm-windows/tabby-hubterm/
          cp -r dist ../tabby-hubterm-windows/tabby-hubterm/
          cd ../tabby-hubterm-windows
          zip -r "../tabby-hubterm-${VERSION}-windows.zip" *

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          # Frontend and Tabby builds intentionally create artifacts before GoReleaser.
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Tabby plugin package
        run: |
          VERSION=$(jq -r .version tabby-hubterm-plugin/package.json)
          gh release upload "${GITHUB_REF_NAME}" tabby-hubterm-plugin/tabby-hubterm-${VERSION}.tgz --clobber
          gh release upload "${GITHUB_REF_NAME}" tabby-hubterm-${VERSION}-windows.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


